name: DB Migration

on:
  workflow_dispatch:
    inputs:
      run_backfill_keywords:
        description: 'Run keyword mappings backfill after migration'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: db-migration-production
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run DB migrations
        run: npm run db:migrate

      - name: Run keyword backfill
        if: ${{ github.event.inputs.run_backfill_keywords == 'true' }}
        run: npm run db:backfill:keywords
